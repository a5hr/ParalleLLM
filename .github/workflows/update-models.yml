name: Update Models

on:
  schedule:
    - cron: '0 23 * * *' # Daily 23:00 UTC (08:00 JST)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run update-models
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pnpm run update-models --verbose

      - name: Read review report
        id: report
        run: |
          if [ -f data/update-report.md ]; then
            {
              echo 'body<<EOF'
              cat data/update-report.md
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=No review report generated." >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up report file
        run: rm -f data/update-report.md

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet data/models.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update model definitions'
          title: 'chore: update model definitions'
          body: |
            Automated update of `data/models.json` from provider APIs.

            ${{ steps.report.outputs.body }}

            ---
            Run `pnpm run update-models --dry-run` locally to preview changes.
          branch: chore/update-models
          delete-branch: true
